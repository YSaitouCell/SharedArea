<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リサイクル業者マップ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 地図を全画面表示にする設定 */
        body, html { height: 100%; margin: 0; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        /* 検索バーを地図の上に浮かせる */
        .search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="search-container card p-2 shadow">
        <input type="text" id="searchInput" class="form-control" placeholder="業者名や住所で検索...">
    </div>

    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // 1. 地図の初期化（初期位置は日本の中心あたり）
        const map = L.map('map').setView([36.2048, 138.2529], 5);

        // 2. 地図タイルの読み込み（OpenStreetMap）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        let allMarkers = []; // 検索用にマーカーを保持しておく配列

        // 3. CSVデータの読み込みとピン立て
        Papa.parse("merged_facilities_with_coords.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                
                data.forEach(row => {
                    // latitude, longitude があるデータのみ処理
                    if (row.latitude && row.longitude) {
                        const lat = parseFloat(row.latitude);
                        const lng = parseFloat(row.longitude);

                        // ピンを立てる
                        const marker = L.marker([lat, lng]).addTo(map);

                        // クリック時のポップアップ内容
                        const popupContent = `
                            <strong>${row.facility_name}</strong><br>
                            <small>${row.address}</small><br>
                            <hr style="margin:5px 0;">
                            処理: ${row.process_tags || '不明'}
                        `;
                        marker.bindPopup(popupContent);

                        // 検索用にデータをマーカーオブジェクトに紐付けて配列に保存
                        marker.data = row; 
                        allMarkers.push(marker);
                    }
                });
            }
        });

        // 4. 簡易検索機能
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            const keyword = e.target.value.toLowerCase();

            allMarkers.forEach(marker => {
                const name = (marker.data.facility_name || '').toLowerCase();
                const address = (marker.data.address || '').toLowerCase();
                const tags = (marker.data.process_tags || '').toLowerCase();

                // 名前、住所、タグのいずれかにヒットすれば表示
                if (name.includes(keyword) || address.includes(keyword) || tags.includes(keyword)) {
                    if (!map.hasLayer(marker)) {
                        map.addLayer(marker);
                    }
                } else {
                    if (map.hasLayer(marker)) {
                        map.removeLayer(marker);
                    }
                }
            });
        });
    </script>
</body>
</html>
