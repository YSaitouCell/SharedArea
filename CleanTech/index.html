<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食品リサイクル業者＆排出拠点マップ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .control-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 95%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            padding: 15px;
            max-height: 50vh;
            overflow-y: auto;
        }

        /* 共通ピンのスタイル */
        .custom-pin {
            background-color: #fff;
            border: 2px solid #333;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* リサイクル業者用（丸形） */
        .pin-circle { border-radius: 50%; }
        .pin-fertilizer { background-color: #28a745; color: white; }
        .pin-feed { background-color: #fd7e14; color: white; }
        .pin-methane { background-color: #6f42c1; color: white; }
        .pin-other { background-color: #0d6efd; color: white; }
        
        /* 宿泊施設用（角丸四角形） */
        .pin-square { border-radius: 8px; font-size: 16px; }
        .pin-hotel { background-color: #343a40; color: white; border-color: #212529; } /* 黒系 */
        .pin-ryokan { background-color: #795548; color: white; border-color: #5d4037; } /* 茶色系 */
        
        .btn-google-map { width: 100%; margin-top: 10px; }
        .info-link { text-decoration: none; color: #0d6efd; }
        .info-link:hover { text-decoration: underline; }
        
        /* フィルタセクションの区切り */
        .filter-section { border-top: 1px solid #dee2e6; padding-top: 10px; margin-top: 10px; }
        .section-title { font-size: 0.85rem; font-weight: bold; color: #6c757d; margin-bottom: 5px; width: 100%; }
    </style>
</head>
<body>

    <div class="control-panel">
        <input type="text" id="searchInput" class="form-control mb-2" placeholder="名称、住所、品目で検索...">
        
        <div class="row g-2">
            <div class="col-12 d-flex flex-wrap gap-2 mb-1">
                <div class="section-title"><i class="fa-solid fa-recycle"></i> リサイクル施設</div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="filterFertilizer" checked>
                    <label class="form-check-label badge bg-success" for="filterFertilizer">肥料化</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="filterFeed" checked>
                    <label class="form-check-label badge bg-warning text-dark" for="filterFeed">飼料化</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="filterMethane" checked>
                    <label class="form-check-label badge" style="background-color:#6f42c1; color:white;" for="filterMethane">メタン化</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="filterOther" checked>
                    <label class="form-check-label badge bg-primary" for="filterOther">その他</label>
                </div>
            </div>

            <div class="col-12 d-flex flex-wrap gap-3 mb-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="filterOnlyCertified">
                    <label class="form-check-label fw-bold" for="filterOnlyCertified" style="color:#d63384; font-size: 0.9rem;">
                        <i class="fa-solid fa-certificate"></i> 認定のみ
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="filterOnlyRegistered">
                    <label class="form-check-label fw-bold text-dark" for="filterOnlyRegistered" style="font-size: 0.9rem;">
                        <i class="fa-solid fa-id-card"></i> 登録のみ
                    </label>
                </div>
            </div>

            <div class="col-12 filter-section d-flex flex-wrap gap-3">
                <div class="section-title"><i class="fa-solid fa-building-user"></i> 排出拠点（食品残渣）</div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="filterHotel" checked>
                    <label class="form-check-label fw-bold" for="filterHotel"><i class="fa-solid fa-hotel" style="color:#343a40;"></i> ホテル</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="filterRyokan" checked>
                    <label class="form-check-label fw-bold" for="filterRyokan"><i class="fa-solid fa-bed" style="color:#795548;"></i> 旅館</label>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const map = L.map('map').setView([36.2048, 138.2529], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let allMarkers = [];

        // リサイクル施設用アイコン（丸形）
        function createFacilityIcon(type) {
            let className = 'custom-pin pin-circle ';
            let iconHtml = '';
            if (type === 'fertilizer') { className += 'pin-fertilizer'; iconHtml = '<i class="fa-solid fa-leaf"></i>'; }
            else if (type === 'feed') { className += 'pin-feed'; iconHtml = '<i class="fa-solid fa-piggy-bank"></i>'; }
            else if (type === 'methane') { className += 'pin-methane'; iconHtml = '<i class="fa-solid fa-bolt"></i>'; }
            else { className += 'pin-other'; iconHtml = '<i class="fa-solid fa-recycle"></i>'; }

            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="${className}" style="width: 32px; height: 32px;">${iconHtml}</div>`,
                iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -16]
            });
        }

        // 宿泊施設用アイコン（角丸四角形）
        function createAccomIcon(type) {
            let className = 'custom-pin pin-square ';
            let iconHtml = '';
            if (type === 'hotel') { className += 'pin-hotel'; iconHtml = '<i class="fa-solid fa-hotel"></i>'; }
            else { className += 'pin-ryokan'; iconHtml = '<i class="fa-solid fa-bed"></i>'; }

            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="${className}" style="width: 30px; height: 30px;">${iconHtml}</div>`,
                iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -15]
            });
        }

        // --- 1. リサイクル施設の読み込み ---
        Papa.parse("merged_facilities_with_coords.csv?v=" + new Date().getTime(), {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results1) {
                results1.data.forEach(row => {
                    if (row.latitude && row.longitude) {
                        const tags = row.process_tags || '';
                        let category = 'other';
                        if (row.is_methane === 'True' || tags.includes('メタン')) category = 'methane';
                        else if (tags.includes('飼料')) category = 'feed';
                        else if (tags.includes('肥料')) category = 'fertilizer';

                        const marker = L.marker([parseFloat(row.latitude), parseFloat(row.longitude)], {
                            icon: createFacilityIcon(category)
                        });

                        let badges = '';
                        if (row.is_certified === 'True') badges += '<span class="badge bg-danger me-1"><i class="fa-solid fa-certificate"></i> 認定</span>';
                        if (row.is_registered === 'True') badges += '<span class="badge bg-dark"><i class="fa-solid fa-id-card"></i> 登録</span>';

                        const phoneLink = row.phone ? `<p class="mb-1"><i class="fa-solid fa-phone"></i> <a href="tel:${row.phone}" class="info-link">${row.phone}</a></p>` : '';
                        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(row.facility_name)}`;
                        
                        const popupContent = `
                            <div style="min-width:200px;">
                                <div class="mb-2">${badges}</div>
                                <h6 class="fw-bold mb-1">${row.facility_name}</h6>
                                <p class="text-muted small mb-2">${row.address}</p>
                                <div class="border-top pt-2 mt-2" style="font-size:13px;">
                                    ${phoneLink}
                                    <p class="mb-1"><i class="fa-brands fa-google text-primary"></i> <a href="${searchUrl}" target="_blank" class="info-link">GoogleでWeb検索</a></p>
                                    <p class="mb-0 mt-2 text-secondary"><strong>能力:</strong> ${row.daily_capacity || '-'} t/日</p>
                                </div>
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${row.latitude},${row.longitude}" target="_blank" class="btn btn-primary btn-sm btn-google-map text-white">
                                    <i class="fa-solid fa-location-arrow"></i> 経路案内
                                </a>
                            </div>
                        `;

                        marker.bindPopup(popupContent);
                        marker.on('mouseover', function (e) { this.openPopup(); });

                        marker.isFacility = true; // リサイクル施設フラグ
                        marker.category = category;
                        marker.isCertified = row.is_certified === 'True';
                        marker.isRegistered = row.is_registered === 'True';
                        marker.searchData = `${row.facility_name} ${row.address} ${tags}`.toLowerCase();
                        
                        allMarkers.push(marker);
                        marker.addTo(map);
                    }
                });

                // --- 2. 宿泊施設の読み込み（入れ子にして実行） ---
                Papa.parse("hotels_with_coords.csv?v=" + new Date().getTime(), {
                    download: true, header: true, skipEmptyLines: true,
                    complete: function(results2) {
                        results2.data.forEach(row => {
                            if (row.latitude && row.longitude) {
                                const type = row.type; // 'hotel' or 'ryokan'
                                const marker = L.marker([parseFloat(row.latitude), parseFloat(row.longitude)], {
                                    icon: createAccomIcon(type)
                                });

                                const badgeColor = type === 'hotel' ? 'bg-dark' : 'bg-secondary';
                                const badgeText = type === 'hotel' ? 'ホテル' : '旅館';
                                const phoneLink = row.phone ? `<p class="mb-1"><i class="fa-solid fa-phone"></i> <a href="tel:${row.phone}" class="info-link">${row.phone}</a></p>` : '';
                                const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(row.name)}`;

                                const popupContent = `
                                    <div style="min-width:200px;">
                                        <div class="mb-2"><span class="badge ${badgeColor}">${badgeText}</span></div>
                                        <h6 class="fw-bold mb-1">${row.name}</h6>
                                        <p class="text-muted small mb-2">${row.address}</p>
                                        <div class="border-top pt-2 mt-2" style="font-size:13px;">
                                            ${phoneLink}
                                            <p class="mb-1"><i class="fa-brands fa-google text-primary"></i> <a href="${searchUrl}" target="_blank" class="info-link">GoogleでWeb検索</a></p>
                                        </div>
                                        <a href="https://www.google.com/maps/dir/?api=1&destination=${row.latitude},${row.longitude}" target="_blank" class="btn btn-primary btn-sm btn-google-map text-white">
                                            <i class="fa-solid fa-location-arrow"></i> 経路案内
                                        </a>
                                    </div>
                                `;

                                marker.bindPopup(popupContent);
                                marker.on('mouseover', function (e) { this.openPopup(); });

                                marker.isFacility = false; // 排出拠点フラグ
                                marker.category = type; // 'hotel' または 'ryokan'
                                marker.searchData = `${row.name} ${row.address}`.toLowerCase();
                                
                                allMarkers.push(marker);
                                marker.addTo(map);
                            }
                        });
                        
                        // 全ての読み込みが終わったら一回フィルタリングを走らせる
                        filterMarkers();
                    }
                });
            }
        });

        // --- フィルタリング＆検索機能 ---
        function filterMarkers() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            
            // 施設用フィルタ
            const showFert = document.getElementById('filterFertilizer').checked;
            const showFeed = document.getElementById('filterFeed').checked;
            const showMeth = document.getElementById('filterMethane').checked;
            const showOther = document.getElementById('filterOther').checked;
            const onlyCert = document.getElementById('filterOnlyCertified').checked;
            const onlyReg = document.getElementById('filterOnlyRegistered').checked;
            
            // 宿泊施設用フィルタ
            const showHotel = document.getElementById('filterHotel').checked;
            const showRyokan = document.getElementById('filterRyokan').checked;

            allMarkers.forEach(marker => {
                const keyMatch = marker.searchData.includes(keyword);
                let show = false;

                if (marker.isFacility) {
                    // リサイクル施設の場合の表示判定
                    const catMatch = (marker.category === 'fertilizer' && showFert) ||
                                     (marker.category === 'feed' && showFeed) ||
                                     (marker.category === 'methane' && showMeth) ||
                                     (marker.category === 'other' && showOther);
                    
                    const certMatch = !onlyCert || marker.isCertified;
                    const regMatch = !onlyReg || marker.isRegistered;
                    show = catMatch && certMatch && regMatch && keyMatch;
                } else {
                    // 宿泊施設（排出拠点）の場合の表示判定
                    const catMatch = (marker.category === 'hotel' && showHotel) ||
                                     (marker.category === 'ryokan' && showRyokan);
                    show = catMatch && keyMatch;
                }

                if (show) {
                    if (!map.hasLayer(marker)) map.addLayer(marker);
                } else {
                    if (map.hasLayer(marker)) map.removeLayer(marker);
                }
            });
        }

        // 全てのフィルタ要素にイベントリスナーを登録
        ['searchInput', 'filterFertilizer', 'filterFeed', 'filterMethane', 'filterOther', 'filterOnlyCertified', 'filterOnlyRegistered', 'filterHotel', 'filterRyokan'].forEach(id => {
            document.getElementById(id).addEventListener(id === 'searchInput' ? 'keyup' : 'change', filterMarkers);
        });
    </script>
</body>
</html>
